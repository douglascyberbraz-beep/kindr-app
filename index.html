    <!-- QRCode JS (Simple implementation via CDN if needed, or mock image for now) -->

    <script src="js/pages/profile.js"></script>

    <script src="js/pages/memories.js"></script>
    <script src="js/pages/quests.js"></script>
    <script src="js/pages/safe.js"></script>
    <script src="js/pages/memories.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/pages/legal.js"></script>

    <!-- Main initialization LAST -->
    <script src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Nuclear cleanup command for the user if needed
                window.forceResetApp = () => {
                    localStorage.clear();
                    caches.keys().then(names => {
                        for (let name of names) caches.delete(name);
                    });
                    navigator.serviceWorker.getRegistrations().then(regs => {
                        for (let reg of regs) reg.unregister();
                    });
                    setTimeout(() => window.location.reload(true), 500);
                };

                navigator.serviceWorker.register('sw.js?v=1.2.1').then(reg => {
                    console.log('Service Worker v1.2.1 registrado');

                    // Detect updates and reload
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version available, reload to apply
                                window.location.reload();
                            }
                        });
                    });
                }).catch(err => console.log('Error al registrar SW', err));
            });

            // Note: Removed the aggressive window.location.reload() on 'controllerchange'
            // because it forces a double-load the moment the app boots for the first time
            // or updates. We let the PWA handle files silently.
        }
    </script>
</body>

</html>
